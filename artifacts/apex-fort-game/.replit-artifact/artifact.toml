kind = "web"
previewPath = "/game/"
title = "APEX FORT Game"
version = "1.0.0"
id = "artifacts/apex-fort-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/game/" ]
localPort = 26229

[services.development]
run = "pnpm --filter @workspace/apex-fort-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/apex-fort-game", "run", "build" ]
publicDir = "artifacts/apex-fort-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26229"
BASE_PATH = "/game/"
