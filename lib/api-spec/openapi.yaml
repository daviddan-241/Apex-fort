openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AI Game Creator API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Game project operations
  - name: agents
    description: AI agent operations
  - name: files
    description: File upload operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all game projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new game project from prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project with full details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "404":
          description: Not found
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /projects/{id}/generate:
    post:
      operationId: generateProject
      tags: [projects]
      summary: Start AI generation pipeline for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Generation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}/download:
    get:
      operationId: downloadProject
      tags: [projects]
      summary: Download project as a zip file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Zip file download
          content:
            application/zip:
              schema:
                type: string
                format: binary

  /projects/{id}/logs:
    get:
      operationId: getProjectLogs
      tags: [projects]
      summary: Get agent build logs for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentLog"

  /projects/{id}/files:
    get:
      operationId: getProjectFiles
      tags: [projects]
      summary: Get generated file tree for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File tree
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeneratedFile"

  /projects/stats:
    get:
      operationId: getProjectStats
      tags: [projects]
      summary: Get dashboard stats across all projects
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectStats"

  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List all available AI agents and their status
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"

  /files/upload:
    post:
      operationId: uploadFile
      tags: [files]
      summary: Upload a file (image, video, zip, or other asset)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/FileUploadData"
      responses:
        "200":
          description: Uploaded file info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadedFile"

  /files/{id}/analyze:
    post:
      operationId: analyzeFile
      tags: [files]
      summary: AI analyze an uploaded file (image/video/zip)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileAnalysis"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Project:
      type: object
      required: [id, name, prompt, status, progress, createdAt]
      properties:
        id:          { type: string }
        name:        { type: string }
        prompt:      { type: string }
        genre:       { type: ["string", "null"] }
        status:      { type: string, enum: [pending, planning, generating, building, testing, packaging, completed, failed] }
        progress:    { type: integer }
        engine:      { type: string }
        platform:    { type: ["string", "null"] }
        createdAt:   { type: string }
        updatedAt:   { type: ["string", "null"] }
        fileCount:   { type: ["integer", "null"] }
        downloadUrl: { type: ["string", "null"] }

    ProjectDetail:
      type: object
      required: [id, name, prompt, status, progress, createdAt, logs, files]
      properties:
        id:        { type: string }
        name:      { type: string }
        prompt:    { type: string }
        genre:     { type: ["string", "null"] }
        status:    { type: string }
        progress:  { type: integer }
        engine:    { type: string }
        platform:  { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: ["string", "null"] }
        logs:
          type: array
          items:
            $ref: "#/components/schemas/AgentLog"
        files:
          type: array
          items:
            $ref: "#/components/schemas/GeneratedFile"
        gameDesign: { type: ["string", "null"] }
        features:
          type: array
          items: { type: string }

    ProjectInput:
      type: object
      required: [prompt]
      properties:
        prompt:   { type: string, minLength: 1 }
        platform: { type: string }
        features:
          type: array
          items: { type: string }
        uploadedFileIds:
          type: array
          items: { type: string }

    ProjectStats:
      type: object
      required: [total, completed, inProgress, failed, totalFiles]
      properties:
        total:      { type: integer }
        completed:  { type: integer }
        inProgress: { type: integer }
        failed:     { type: integer }
        totalFiles: { type: integer }
        byGenre:
          type: array
          items:
            type: object
            required: [genre, count]
            properties:
              genre: { type: string }
              count: { type: integer }

    AgentLog:
      type: object
      required: [id, agentId, agentName, level, message, timestamp]
      properties:
        id:        { type: string }
        agentId:   { type: string }
        agentName: { type: string }
        level:     { type: string, enum: [info, success, warning, error] }
        message:   { type: string }
        timestamp: { type: string }
        phase:     { type: ["string", "null"] }

    GeneratedFile:
      type: object
      required: [path, type, size]
      properties:
        path:    { type: string }
        type:    { type: string }
        size:    { type: integer }
        content: { type: ["string", "null"] }

    Agent:
      type: object
      required: [id, name, role, status, color]
      properties:
        id:     { type: string }
        name:   { type: string }
        role:   { type: string }
        status: { type: string, enum: [idle, working, complete, error] }
        color:  { type: string }
        currentTask: { type: ["string", "null"] }

    FileUploadData:
      type: object
      properties:
        file:
          type: string
          format: binary
        projectId:
          type: string

    UploadedFile:
      type: object
      required: [id, originalName, mimeType, size, path]
      properties:
        id:           { type: string }
        originalName: { type: string }
        mimeType:     { type: string }
        size:         { type: integer }
        path:         { type: string }
        url:          { type: string }

    FileAnalysis:
      type: object
      required: [fileId, summary]
      properties:
        fileId:      { type: string }
        summary:     { type: string }
        suggestions:
          type: array
          items: { type: string }
        detectedObjects:
          type: array
          items: { type: string }
        gameElements:
          type: array
          items: { type: string }
