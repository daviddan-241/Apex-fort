openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: 3D Game Engine API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sessions
    description: Game session management
  - name: config
    description: Game engine configuration
  - name: chat
    description: AI upgrade chat
  - name: leaderboard
    description: Player scores

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List active game sessions
      responses:
        "200":
          description: Active sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GameSession"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a new game session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionInput"
      responses:
        "201":
          description: Created session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameSession"

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get session by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameSession"
        "404":
          description: Not found

  /config:
    get:
      operationId: getConfig
      tags: [config]
      summary: Get current engine config
      responses:
        "200":
          description: Engine configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngineConfig"
    patch:
      operationId: updateConfig
      tags: [config]
      summary: Update engine configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigUpdate"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngineConfig"

  /chat:
    get:
      operationId: listChatMessages
      tags: [chat]
      summary: Get AI chat history
      responses:
        "200":
          description: Chat messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send AI upgrade command
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatInput"
      responses:
        "200":
          description: AI response with applied changes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get top player scores
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"
    post:
      operationId: submitScore
      tags: [leaderboard]
      summary: Submit player score
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScoreInput"
      responses:
        "201":
          description: Score recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardEntry"

  /stats:
    get:
      operationId: getStats
      tags: [leaderboard]
      summary: Get global game statistics
      responses:
        "200":
          description: Global stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    GameSession:
      type: object
      required: [id, name, playerCount, maxPlayers, gameMode, createdAt, sessionCode]
      properties:
        id:
          type: string
        name:
          type: string
        playerCount:
          type: integer
        maxPlayers:
          type: integer
        gameMode:
          type: string
          enum: [battle_royale, deathmatch, sandbox]
        createdAt:
          type: string
        sessionCode:
          type: string
        isPublic:
          type: boolean
        hostName:
          type: string

    SessionInput:
      type: object
      required: [name, gameMode]
      properties:
        name:
          type: string
          minLength: 1
        gameMode:
          type: string
          enum: [battle_royale, deathmatch, sandbox]
        maxPlayers:
          type: integer
          minimum: 2
          maximum: 100
        isPublic:
          type: boolean
        hostName:
          type: string

    EngineConfig:
      type: object
      required: [id, movementSpeed, jumpHeight, gravity, fogEnabled, fogDensity, bloomEnabled, cameraMode, fov, bulletDamage, reloadTime, createdAt, updatedAt]
      properties:
        id:
          type: integer
        movementSpeed:
          type: number
        sprintMultiplier:
          type: number
        jumpHeight:
          type: number
        gravity:
          type: number
        fogEnabled:
          type: boolean
        fogDensity:
          type: number
        bloomEnabled:
          type: boolean
        bloomIntensity:
          type: number
        cameraMode:
          type: string
          enum: [third_person, first_person, shoulder]
        fov:
          type: number
        bulletDamage:
          type: number
        reloadTime:
          type: number
        ambientLight:
          type: number
        shadowsEnabled:
          type: boolean
        particlesEnabled:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string

    ConfigUpdate:
      type: object
      properties:
        movementSpeed:
          type: number
        sprintMultiplier:
          type: number
        jumpHeight:
          type: number
        gravity:
          type: number
        fogEnabled:
          type: boolean
        fogDensity:
          type: number
        bloomEnabled:
          type: boolean
        bloomIntensity:
          type: number
        cameraMode:
          type: string
          enum: [third_person, first_person, shoulder]
        fov:
          type: number
        bulletDamage:
          type: number
        reloadTime:
          type: number
        ambientLight:
          type: number
        shadowsEnabled:
          type: boolean
        particlesEnabled:
          type: boolean

    ChatMessage:
      type: object
      required: [id, role, content, createdAt]
      properties:
        id:
          type: integer
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        configChanges:
          type: ["string", "null"]
        createdAt:
          type: string

    ChatInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    LeaderboardEntry:
      type: object
      required: [id, playerName, score, kills, deaths, gameMode, createdAt]
      properties:
        id:
          type: integer
        playerName:
          type: string
        score:
          type: integer
        kills:
          type: integer
        deaths:
          type: integer
        gameMode:
          type: string
        createdAt:
          type: string

    ScoreInput:
      type: object
      required: [playerName, score, kills, deaths, gameMode]
      properties:
        playerName:
          type: string
          minLength: 1
        score:
          type: integer
        kills:
          type: integer
        deaths:
          type: integer
        gameMode:
          type: string

    GameStats:
      type: object
      required: [totalSessions, activePlayers, totalKills, topScore]
      properties:
        totalSessions:
          type: integer
        activePlayers:
          type: integer
        totalKills:
          type: integer
        topScore:
          type: integer
        avgSessionDuration:
          type: number
